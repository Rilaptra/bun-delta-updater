# file: .github/workflows/delta-patcher.yml
name: Bun Delta Patcher
on:
  schedule:
    - cron: '0 0 * * *' # Jalan setiap tengah malam UTC
  workflow_dispatch: # Trigger manual

jobs:
  build-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Install xdelta3 & jq
        run: sudo apt-get update && sudo apt-get install -y xdelta3 jq curl unzip

      - name: Check Latest Upstream Release (oven-sh/bun)
        id: upstream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pakai GitHub Token biar ga kena rate limit API
          LATEST=$(curl -sL -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/oven-sh/bun/releases/latest | jq -r .tag_name)
          echo "Upstream Latest: $LATEST"
          echo "tag=$LATEST" >> $GITHUB_OUTPUT

      - name: Check Latest Local Release
        id: local
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LOCAL=$(curl -sL -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .tag_name || echo "none")
          if [ "$LOCAL" == "null" ] || [ -z "$LOCAL" ]; then LOCAL="none"; fi
          echo "Local Latest: $LOCAL"
          echo "tag=$LOCAL" >> $GITHUB_OUTPUT

      - name: Generate Patch & Release
        if: steps.upstream.outputs.tag != steps.local.outputs.tag && steps.local.outputs.tag != 'none' && steps.upstream.outputs.tag != 'null'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OLD_VER: ${{ steps.local.outputs.tag }}
          NEW_VER: ${{ steps.upstream.outputs.tag }}
        run: |
          echo "Updating from $OLD_VER to $NEW_VER"
          
          # Target OS/Arch
          TARGETS=("windows-x64") # Fokus ke Windows-x64 karena kamu pakai Windows
          
          mkdir -p patches
          
          for TARGET in "${TARGETS[@]}"; do
            echo "Processing $TARGET..."
            
            # Download Old
            curl -sL "https://github.com/oven-sh/bun/releases/download/$OLD_VER/bun-$TARGET.zip" -o old.zip
            unzip -q old.zip -d old_dir
            
            # Download New
            curl -sL "https://github.com/oven-sh/bun/releases/download/$NEW_VER/bun-$TARGET.zip" -o new.zip
            unzip -q new.zip -d new_dir
            
            # Generate Delta Patch (Level 9 Compression)
            PATCH_NAME="bun-$TARGET-$OLD_VER-to-$NEW_VER.patch"
            # Perintah xdelta3 untuk bikin patch: -e (encode), -S djw (secondary compression), -9 (max)
            xdelta3 -e -S djw -9 old_dir/bun-$TARGET/bun.exe new_dir/bun-$TARGET/bun.exe patches/$PATCH_NAME
            
            # Cleanup
            rm -rf old.zip new.zip old_dir new_dir
          done

          # Create GitHub Release & Upload Patches
          gh release create "$NEW_VER" ./patches/* --repo ${{ github.repository }} --title "Bun $NEW_VER Patches" --notes "Delta patches from $OLD_VER to $NEW_VER"
